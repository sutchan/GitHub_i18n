name: GitHub i18n CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  # 代码质量检查
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 安装依赖
      run: npm ci

    - name: 运行 ESLint
      run: npm run lint

    - name: 检查代码格式
      run: npm run format:check

  # 单元测试
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: 安装依赖
      run: npm ci

    - name: 运行测试
      run: npm run test

    - name: 生成覆盖率报告
      run: npm run test:coverage

    - name: 上传覆盖率到 Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  # 构建项目
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 安装依赖
      run: npm ci

    - name: 构建项目
      run: npm run build

    - name: 验证构建产物
      run: npm run validate

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 30

  # 安全扫描
  security:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 安装依赖
      run: npm ci

    - name: 运行安全审计
      run: npm audit --audit-level=moderate || true

  # 发布到 GitHub Releases
  release:
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.event_name == 'release'

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 安装依赖
      run: npm ci

    - name: 下载构建产物
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: 创建发布包
      run: |
        mkdir -p release
        cp -r dist/* release/
        cp README.md LICENSE release/
        cd release
        zip -r ../GitHub_i18n_${{ github.event.release.tag_name }}.zip .

    - name: 上传发布资产
      uses: softprops/action-gh-release@v1
      with:
        files: GitHub_i18n_${{ github.event.release.tag_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 通知
  notify:
    runs-on: ubuntu-latest
    needs: [build, test, security]
    if: always()

    steps:
    - name: 通知构建结果
      run: |
        if [ "${{ needs.build.result }}" == "success" ] && [ "${{ needs.test.result }}" == "success" ]; then
          echo "✅ 构建和测试全部通过"
        else
          echo "❌ 构建或测试失败"
          exit 1
        fi
